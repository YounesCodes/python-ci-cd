name: CI Pipeline

on:
  push:
    branches: master

permissions:
        id-token: write # This is required for requesting the JWT
        contents: read # This is required for actions/checkout

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies (flask + pytest)
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest test_app.py -v
      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep --config auto . --error

  build_push_scan_provision_deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v5

    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag ${{ secrets.DOCKER_USERNAME }}/python-ci-cd:latest
    
    - name: Security scanning with Trivy
      uses: aquasecurity/trivy-action@0.35.0
      with:
        image-ref: ${{ secrets.DOCKER_USERNAME }}/python-ci-cd:latest
        severity: CRITICAL,HIGH
        exit-code: 1 # fails pipeline on crit/high findings
        ignore-unfixed: true # can't fix what is unfixed lol

    - name: Log in to Docker Hub
      run:  echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Push the image
      run : docker push ${{ secrets.DOCKER_USERNAME }}/python-ci-cd:latest
    
    - name: Configure AWS creds
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: eu-north-1

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Init, Validate, Plan and Apply
      run: |
        terraform init \
          -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
          -backend-config="key=project/terraform.tfstate" \
          -backend-config="region=eu-north-1"
        terraform validate
        terraform plan -out=tfplan
        terraform apply -auto-approve tfplan
      working-directory: terraform
    
    - name: Export host
      run : echo "PUBLIC_DNS=$(terraform output -raw public_dns)" >> $GITHUB_ENV
      working-directory: terraform

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.2.5
      with:
        host: ${{  env.PUBLIC_DNS  }}
        username: ec2-user
        key: ${{ secrets.EC2_KEY }}
        script: |
          while ! command -v docker &> /dev/null; do echo "Waiting for Docker..."; sleep 10; done
          docker stop myapp || true
          docker stop myapp || true
          docker rm myapp || true
          docker rmi ${{ secrets.DOCKER_USERNAME }}/python-ci-cd:latest || true
          docker pull ${{ secrets.DOCKER_USERNAME }}/python-ci-cd:latest
          docker run -d -p 80:5000 --name myapp ${{ secrets.DOCKER_USERNAME }}/python-ci-cd:latest
          docker image prune -f