name: CI Pipeline

on:
  push:
    branches: master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies (flask + pytest)
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest test_app.py -v

  build_push_scan_deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v5

    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag ${{ secrets.DOCKER_USERNAME }}/python-ci-cd:latest
    
    - name: Security scanning with Trivy
      uses: aquasecurity/trivy-action@0.35.0
      with:
        image-ref: ${{ secrets.DOCKER_USERNAME }}/python-ci-cd:latest
        severity: CRITICAL,HIGH
        exit-code: 1 # fails pipeline on crit/high findings
        ignore-unfixed: true # can't fix what is unfixed lol

    - name: Log in to Docker Hub
      run:  echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Push the image
      run : docker push ${{ secrets.DOCKER_USERNAME }}/python-ci-cd:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.2.5
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/python-ci-cd:latest
          docker stop myapp || true
          docker rm myapp || true
          docker run -d -p 80:5000 --name myapp ${{ secrets.DOCKER_USERNAME }}/python-ci-cd:latest