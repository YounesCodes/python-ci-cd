name: CI Pipeline

on:
  push:
    branches: master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies (flask + pytest)
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest test_app.py -v

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag ${{ secrets.DOCKER_USERNAME }}/python-ci-cd:latest

    - name: Log in to Docker Hub
      run:  echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Push the image
      run : docker push ${{ secrets.DOCKER_USERNAME }}/python-ci-cd:latest